<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Live Viewer</title>

<style>
body {
    margin:0;
    background:#0a0a0f;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
    font-family:sans-serif;
}

.container {
    text-align:center;
}

img {
    width:90vw;
    max-width:500px;
    border-radius:12px;
    background:#111;
    padding:10px;
}

.status {
    margin-top:10px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
    <img id="qr" src="qr.png" />
    <div class="status" id="status">Loading QR...</div>
</div>

<script>
const qr = document.getElementById("qr");
const status = document.getElementById("status");

let interval = 5000; // 5 sec refresh

function loadQR() {
    const url = "qr.png?t=" + Date.now(); // cache bust
    qr.src = url;

    status.innerText = "Updated: " + new Date().toLocaleTimeString();
}

// Auto refresh
setInterval(loadQR, interval);

// First load
loadQR();
</script>

</body>
</html>
