<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Scanner</title>
    <style>
        /* ── Reset & Base ──────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --border: #2a2a3a;
            --text: #e0e0e8;
            --text-dim: #6a6a7a;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.25);
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --qr-size: min(85vw, 85vh);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── Subtle background grid ────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(108,99,255,0.04) 0%, transparent 70%),
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Main Container ────────────────────────────── */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* ── Title ─────────────────────────────────────── */
        .title {
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .title .dot.connected {
            background: var(--success);
            animation: none;
        }

        .title .dot.error {
            background: var(--danger);
            animation: pulse-dot 0.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ── QR Code Frame ─────────────────────────────── */
        .qr-frame {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--qr-size);
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(12px, 3vw, 28px);
            box-shadow:
                0 0 60px rgba(108, 99, 255, 0.06),
                0 20px 60px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.4s ease;
        }

        .qr-frame.loaded {
            box-shadow:
                0 0 80px var(--accent-glow),
                0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Corner accents */
        .qr-frame::before,
        .qr-frame::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.5;
        }

        .qr-frame::before {
            top: 10px; left: 10px;
            border-width: 2px 0 0 2px;
            border-radius: 6px 0 0 0;
        }

        .qr-frame::after {
            bottom: 10px; right: 10px;
            border-width: 0 2px 2px 0;
            border-radius: 0 0 6px 0;
        }

        /* ── QR Image ──────────────────────────────────── */
        .qr-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .qr-image.visible {
            opacity: 1;
        }

        /* ── Loading / Placeholder ─────────────────────── */
        .qr-placeholder {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: var(--text-dim);
            font-size: 14px;
            transition: opacity 0.3s ease;
        }

        .qr-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Status Bar ────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: clamp(11px, 1.8vw, 13px);
            color: var(--text-dim);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .countdown-bar {
            width: 60px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .countdown-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 1s linear;
        }

        /* ── Controls ──────────────────────────────────── */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 18px;
        }

        .btn:hover {
            background: var(--border);
            color: var(--text);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.spinning svg {
            animation: spin 0.6s linear;
        }

        /* ── Settings Panel ────────────────────────────── */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .settings-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: min(90vw, 420px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .settings-overlay.open .settings-panel {
            transform: scale(1);
        }

        .settings-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input, .field select {
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus, .field select:focus {
            border-color: var(--accent);
        }

        .settings-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .settings-actions .btn {
            width: auto;
            padding: 10px 20px;
            font-size: 13px;
            border-radius: 8px;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #7b73ff;
            border-color: #7b73ff;
            color: #fff;
        }

        /* ── Toast Notification ────────────────────────── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 13px;
            color: var(--text);
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── Error State ───────────────────────────────── */
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            max-width: 260px;
            line-height: 1.5;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        /* ── Mobile tweaks ─────────────────────────────── */
        @media (max-width: 480px) {
            :root {
                --qr-size: min(90vw, 70vh);
            }

            .qr-frame {
                border-radius: 14px;
            }

            .controls {
                bottom: 14px;
                right: 14px;
            }

            .status-bar {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            :root {
                --qr-size: min(80vh, 50vw);
            }

            .container {
                flex-direction: row;
                gap: 24px;
            }

            .title {
                writing-mode: vertical-lr;
                text-orientation: mixed;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Title -->
        <div class="title">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Waiting for QR...</span>
        </div>

        <!-- QR Code Frame -->
        <div class="qr-frame" id="qrFrame">
            <!-- Loading Placeholder -->
            <div class="qr-placeholder" id="placeholder">
                <div class="spinner"></div>
                <span>Waiting for QR...</span>
            </div>

            <!-- QR Image -->
            <img
                class="qr-image"
                id="qrImage"
                alt="QR Code"
                crossorigin="anonymous"
            />

            <!-- Error Message -->
            <div class="error-msg" id="errorMsg">
                ⚠️ Failed to load QR code.<br>Retrying automatically...
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span>⟳</span>
                <span>Auto-refresh</span>
                <div class="countdown-bar">
                    <div class="countdown-fill" id="countdownFill" style="width: 100%"></div>
                </div>
                <span id="countdownText">10s</span>
            </div>
            <div class="status-item" id="lastUpdate">
                <span>◷</span>
                <span>Never</span>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn" id="refreshBtn" title="Refresh now">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
        </button>
        <button class="btn" id="fullscreenBtn" title="Toggle fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
        </button>
        <button class="btn" id="settingsBtn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
    </div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <div class="settings-title">⚙ Settings</div>

            <div class="field">
                <label>QR Image Source</label>
                <input type="text" id="qrSource" value="qr.png" placeholder="e.g. qr.png or /api/qr">
            </div>

            <div class="field">
                <label>Refresh Interval (seconds)</label>
                <select id="refreshInterval">
                    <option value="3">3 seconds</option>
                    <option value="5">5 seconds</option>
                    <option value="10" selected>10 seconds</option>
                    <option value="15">15 seconds</option>
                    <option value="30">30 seconds</option>
                    <option value="0">Disabled</option>
                </select>
            </div>

            <div class="field">
                <label>Cache Busting</label>
                <select id="cacheBust">
                    <option value="1" selected>Enabled (recommended)</option>
                    <option value="0">Disabled</option>
                </select>
            </div>

            <div class="settings-actions">
                <button class="btn" id="closeSettings">Cancel</button>
                <button class="btn btn-primary" id="saveSettings">Save & Reload</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ── Configuration ────────────────────────────────
        const DEFAULTS = {
            source: 'qr.png',
            interval: 10,
            cacheBust: true
        };

        let config = loadConfig();
        let countdown = config.interval;
        let timer = null;
        let countdownTimer = null;
        let isLoading = false;

        // ── DOM Elements ─────────────────────────────────
        const qrImage     = document.getElementById('qrImage');
        const qrFrame     = document.getElementById('qrFrame');
        const placeholder = document.getElementById('placeholder');
        const errorMsg    = document.getElementById('errorMsg');
        const statusDot   = document.getElementById('statusDot');
        const statusText  = document.getElementById('statusText');
        const countdownFill = document.getElementById('countdownFill');
        const countdownText = document.getElementById('countdownText');
        const lastUpdate  = document.getElementById('lastUpdate');
        const refreshBtn  = document.getElementById('refreshBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const toast       = document.getElementById('toast');

        // ── Config Persistence ───────────────────────────
        function loadConfig() {
            try {
                const saved = JSON.parse(localStorage.getItem('qr-config'));
                return { ...DEFAULTS, ...saved };
            } catch {
                return { ...DEFAULTS };
            }
        }

        function saveConfig() {
            localStorage.setItem('qr-config', JSON.stringify(config));
        }

        // ── QR Loading ───────────────────────────────────
        function buildUrl() {
            let url = config.source;
            if (config.cacheBust) {
                const separator = url.includes('?') ? '&' : '?';
                url += `${separator}_t=${Date.now()}`;
            }
            return url;
        }

        function loadQR() {
            if (isLoading) return;
            isLoading = true;

            setStatus('loading', 'Loading QR...');
            placeholder.classList.remove('hidden');
            errorMsg.classList.remove('visible');

            const url = buildUrl();

            // Create a new image to preload
            const img = new Image();
            img.crossOrigin = 'anonymous';

            img.onload = () => {
                qrImage.src = url;
                qrImage.classList.add('visible');
                placeholder.classList.add('hidden');
                qrFrame.classList.add('loaded');
                setStatus('connected', 'Scan this QR code');
                errorMsg.classList.remove('visible');
                updateLastTime();
                isLoading = false;
            };

            img.onerror = () => {
                qrImage.classList.remove('visible');
                placeholder.classList.add('hidden');
                errorMsg.classList.add('visible');
                setStatus('error', 'QR load failed — retrying');
                isLoading = false;
            };

            img.src = url;
        }

        // ── Status ───────────────────────────────────────
        function setStatus(state, text) {
            statusDot.className = 'dot';
            if (state === 'connected') statusDot.classList.add('connected');
            if (state === 'error') statusDot.classList.add('error');
            statusText.textContent = text;
        }

        function updateLastTime() {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            lastUpdate.querySelector('span:last-child').textContent = time;
        }

        // ── Countdown Timer ──────────────────────────────
        function startCountdown() {
            stopCountdown();
            if (!config.interval) return;

            countdown = config.interval;
            updateCountdownUI();

            countdownTimer = setInterval(() => {
                countdown--;
                updateCountdownUI();
                if (countdown <= 0) {
                    loadQR();
                    countdown = config.interval;
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function updateCountdownUI() {
            const pct = config.interval ? (countdown / config.interval) * 100 : 100;
            countdownFill.style.width = `${pct}%`;
            countdownText.textContent = config.interval ? `${countdown}s` : 'off';
        }

        // ── Toast ────────────────────────────────────────
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ── Fullscreen ───────────────────────────────────
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // ── Settings ─────────────────────────────────────
        function openSettings() {
            document.getElementById('qrSource').value = config.source;
            document.getElementById('refreshInterval').value = String(config.interval);
            document.getElementById('cacheBust').value = config.cacheBust ? '1' : '0';
            settingsOverlay.classList.add('open');
        }

        function closeSettings() {
            settingsOverlay.classList.remove('open');
        }

        function applySettings() {
            config.source   = document.getElementById('qrSource').value.trim() || DEFAULTS.source;
            config.interval = parseInt(document.getElementById('refreshInterval').value);
            config.cacheBust = document.getElementById('cacheBust').value === '1';
            saveConfig();
            closeSettings();
            showToast('✓ Settings saved');
            loadQR();
            startCountdown();
        }

        // ── Event Listeners ──────────────────────────────
        refreshBtn.addEventListener('click', () => {
            refreshBtn.classList.add('spinning');
            setTimeout(() => refreshBtn.classList.remove('spinning'), 600);
            loadQR();
            countdown = config.interval;
        });

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        settingsBtn.addEventListener('click', openSettings);
        document.getElementById('closeSettings').addEventListener('click', closeSettings);
        document.getElementById('saveSettings').addEventListener('click', applySettings);

        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) closeSettings();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' && !e.metaKey && !e.ctrlKey && document.activeElement.tagName !== 'INPUT') {
                loadQR();
                countdown = config.interval;
            }
            if (e.key === 'f' && document.activeElement.tagName !== 'INPUT') {
                toggleFullscreen();
            }
            if (e.key === 'Escape') {
                closeSettings();
            }
        });

        // ── Init ─────────────────────────────────────────
        loadQR();
        startCountdown();
    </script>
</body>
</html>
